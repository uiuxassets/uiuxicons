name: Publish packages

on:
  push:
    tags:
      - "v*"

# Auth uses npm Trusted Publishing (OIDC) - no tokens or secrets.
# Both packages must have this repo + workflow configured as a trusted
# publisher on npmjs.com (package Settings -> Trusted publisher).
permissions:
  contents: read
  id-token: write # OIDC auth + npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # Node 24 ships npm 11.5.1+, required for OIDC trusted publishing
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Refuse to publish if the git tag does not match the package versions,
      # preventing a mistaken tag from shipping the wrong version to npm.
      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for pkg in package.json packages/react/package.json packages/vue/package.json; do
            PKG_VERSION="$(node -p "require('./$pkg').version")"
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Version mismatch in $pkg ($PKG_VERSION) vs tag $TAG_VERSION"
              exit 1
            fi
          done
          echo "All package versions match tag $TAG_VERSION"

      # Full build regenerates icon components from exports/, so a publish
      # can never ship stale codegen.
      - name: Build
        run: |
          npm ci
          npm run build

      - name: Test
        run: npx vitest run

      - name: Publish @uiuxicons/react
        run: npm publish -w @uiuxicons/react --provenance --access public

      - name: Publish @uiuxicons/vue
        run: npm publish -w @uiuxicons/vue --provenance --access public
