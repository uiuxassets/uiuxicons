name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Vitest 4 requires Node 20+; 18 is EOL
        node-version: [20, 24]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: TypeScript check (React)
        run: npx tsc --noEmit -p packages/react/tsconfig.json

      - name: TypeScript check (Vue)
        run: npx tsc --noEmit -p packages/vue/tsconfig.json

      - name: Unit tests
        run: npx vitest run

      - name: Full build
        run: npm run build

      - name: Integration tests
        run: npx vitest run tests/build-output.test.js tests/site-output.test.js
